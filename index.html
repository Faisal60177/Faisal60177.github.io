<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>Siratal Mustaqeem – Apps</title>
  <style>

    .app-card {
      background: white;
      border-radius: 12px;
      padding: 24px 32px;

      min-width: 260px;
    }
    .app-card h2 { font-size: 1.1rem; margin-bottom: 10px; color: #1a472a; }
    .app-card a {
      color: #2d6a4f;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: bold;
    }
    .app-card a:hover { text-decoration: underline; }
